# E4: Out-of-distribution retrieval — Flickr30K + CC3M
# Run after scripts/prepare_cc3m.py has populated data/cache/cc3m/
# Results written to results/E4_cc3m/ (does not overwrite results/E4/)

cache_dir: data/cache
image_cache_file: image_feats_openai_clip-vit-base-patch32_raw.pt
text_cache_file:  text_feats_openai_clip-vit-base-patch32_raw.pt
output_dir: results/E4_cc3m

eval_datasets:
  - flickr30k
  - cc3m

n_captions:
  flickr30k: 5
  cc3m: 1

vision_dim: 768
text_dim:   512
embed_dim:  256

jl_eps:  0.1
jl_seed: 42

batch_size: 2048
seed: 0

models:
  jl_mahal_m256_rfull:
    type: jl_mahal
    mahal_rank: null
    checkpoint_dir: results/E1/coco/jl_mahal_m256_rfull/seed0
  clip_head_m256:
    type: clip_head
    checkpoint_dir: results/E1/coco/clip_head_m256/seed0
  jl_mahal_m256_r128:
    type: jl_mahal
    mahal_rank: 128
    checkpoint_dir: results/E1/coco/jl_mahal_m256_r128/seed0
