# E4: Out-of-distribution retrieval
# Models are loaded from E1 checkpoints; no retraining.

cache_dir: data/cache
image_cache_file: image_feats_openai_clip-vit-base-patch32.pt
text_cache_file:  text_feats_openai_clip-vit-base-patch32.pt
output_dir: results/E4

eval_datasets:
  - flickr30k
  # - cc3m   # optional large-scale OOD test

n_captions:
  flickr30k: 5
  cc3m: 1

vision_dim: 512
text_dim:   512
embed_dim:  256

jl_eps:  0.1
jl_seed: 42

batch_size: 2048
seed: 0

# Models to evaluate.  Paths are relative to project root.
models:
  jl_mahal_m256_rfull:
    type: jl_mahal
    mahal_rank: null
    checkpoint_dir: results/E1/coco/jl_mahal_m256_rfull
  clip_head_m256:
    type: clip_head
    checkpoint_dir: results/E1/coco/clip_head_m256
  jl_mahal_m256_r16:
    type: jl_mahal
    mahal_rank: 16
    checkpoint_dir: results/E1/coco/jl_mahal_m256_r16
