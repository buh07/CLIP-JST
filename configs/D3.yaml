# D3: Relationship-graph ablations
cache_dir: data/cache
image_cache_file: image_feats_openai_clip-vit-base-patch32.pt
text_cache_file:  text_feats_openai_clip-vit-base-patch32.pt
output_dir: results/D3

embed_dims: [64, 128, 256, 512]

high_agreement_fraction: 0.5   # Keep top-50% pairs by CLIP similarity
n_hard_negatives: 1            # Hard negatives per image

jl_eps:  0.1
jl_seed: 42

epochs:      30
batch_size:  2048
lr:          1.0e-3
temperature: 0.07
patience:    5
seed:        0
