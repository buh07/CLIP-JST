# E1: Performance vs. embedding dimension
datasets:
  - coco
  - flickr30k

n_captions:
  coco: 5
  flickr30k: 5

cache_dir: data/cache
image_cache_file: image_feats_openai_clip-vit-base-patch32.pt
text_cache_file:  text_feats_openai_clip-vit-base-patch32.pt
output_dir: results/E1

vision_dim: 768
text_dim:   512

embed_dims:   [64, 128, 256, 512]
mahal_ranks:  [null, 4, 16, 64]   # null = full m×m Mahalanobis

jl_eps:  0.1
jl_seed: 42

epochs:      50
batch_size:  4096
lr:          1.0e-3
temperature: 0.07
patience:    5
seed:        0
